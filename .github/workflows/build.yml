name: Build Bin Extractor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK & Gradle
        run: |
          # Android cmdline-tools
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd /tmp
          curl -sLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

          # Gradle 8.5 direct install
          cd /tmp
          curl -sLo gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle.zip
          mv gradle-8.5 /opt/gradle

      - name: Build APK
        run: |
          export ANDROID_HOME=$ANDROID_HOME
          /opt/gradle/bin/gradle assembleRelease --no-daemon --project-dir .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BinExtractor-APK
          path: app/build/outputs/apk/release/*.apk
